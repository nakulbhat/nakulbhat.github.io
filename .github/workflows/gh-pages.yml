name: Build and Deploy (Pandoc)
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    concurrency:
      group: pages-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Pandoc
        run: sudo apt-get install -y pandoc
      - name: Install html-minifier
        run: npm install -g html-minifier clean-css-cli
      - name: Build HTML
        run: |
          rm -rf public
          mkdir public
          find . -type f -name "*.md" \
            -not -path "./.github/*" | while read file; do
            output="public/${file#./}"
            output="${output%.md}.html"
            mkdir -p "$(dirname "$output")"
            pandoc -s "$file" \
              --template=template.html \
              -o "$output"
          done
      - name: Copy assets
        run: cp -r assets public/assets
      - name: Minify HTML
        run: |
          find public -type f -name "*.html" | while read file; do
            html-minifier \
              --collapse-whitespace \
              --remove-comments \
              --remove-optional-tags \
              --remove-redundant-attributes \
              --remove-script-type-attributes \
              --minify-css true \
              --minify-js true \
              "$file" -o "$file"
          done
      - name: Minify CSS
        run: |
          cleancss -o public/assets/css/styles.css public/assets/css/styles.css
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
