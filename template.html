<!doctype html>
<html $if(lang)$ lang="$lang$" $endif$>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="generator" content="pandoc" />
$for(author-meta)$
<meta name="author" content="$author-meta$" />
$endfor$
$if(date-meta)$
<meta name="date" content="$date-meta$" />
$endif$
<title>$if(title-prefix)$$title-prefix$ - $endif$$pagetitle$</title>
<style>
body {
  background: #000000;
  color: #ffffff;
  font-family: monospace;
  line-height: 1.6;
  max-width: 80ch;
  margin: 40px auto;
  padding: 0;
}
@media (max-width: 768px) {
  body {
    max-width: 80%;
    margin: 40px auto;
  }
}
a {
  color: inherit;
}
code {
  white-space: pre;
}
h1, h2, h3, h4, h5, h6 {
  position: relative;
}
.header-anchor {
  float: right;
  text-decoration: none;
  opacity: 0.3;
}
.header-anchor:hover {
  opacity: 1;
}
</style>
$for(header-includes)$
$header-includes$
$endfor$
</head>
<body>
$body$
</body>
</html>
